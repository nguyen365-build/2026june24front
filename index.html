<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 June 24 — Front</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0f1115;
      color: #e8eaed;
      line-height: 1.5;
    }
    header {
      padding: 2.5rem 1.5rem 1rem;
      text-align: center;
    }
    header h1 { margin: 0 0 .25rem; font-size: 1.8rem; letter-spacing: .5px; }
    header p { margin: 0; color: #9aa0a6; font-size: .95rem; }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    figure {
      margin: 0;
      background: #1b1e24;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.35);
    }
    figure img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      aspect-ratio: 4 / 3;
      cursor: zoom-in;
      opacity: 0;
      transition: opacity .35s ease, transform .25s ease;
    }
    figure.loaded img { opacity: 1; }
    figure img:hover { transform: scale(1.03); }
    /* Shimmer placeholder shown while each photo downloads */
    figure.loading {
      aspect-ratio: 4 / 3;
      background: linear-gradient(90deg, #1b1e24, #262a31, #1b1e24);
      background-size: 200% 100%;
      animation: shimmer 1.2s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position:  200% 0; }
      100% { background-position: -200% 0; }
    }
    #empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #9aa0a6;
      padding: 3rem 1rem;
      border: 1px dashed #3a3f47;
      border-radius: 12px;
    }
    #empty code { background:#1b1e24; padding:.15rem .4rem; border-radius:5px; }
    footer { text-align:center; color:#5f6368; padding: 2rem 1rem 3rem; font-size:.85rem; }
    /* Lightbox */
    #lightbox {
      position: fixed; inset: 0; display: none;
      background: rgba(0,0,0,.9);
      align-items: center; justify-content: center;
      padding: 2rem; cursor: zoom-out; z-index: 50;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>2026 June 24 — Front</h1>
    <p>Image gallery</p>
  </header>

  <main id="gallery"></main>

  <p id="empty" hidden>
    No images yet. Add files named <code>img1</code>–<code>img10</code>
    (.jpg, .jpeg, .png, .webp, or .gif) to the <code>images/</code> folder.
  </p>

  <div id="lightbox"><img alt="" /></div>

  <footer>Hosted on GitHub Pages</footer>

  <script>
    // Render up to 10 image slots. Each slot shows a shimmer placeholder
    // immediately and loads its photo progressively (a single request per
    // image), so a half-loaded page shows "still loading" tiles instead of
    // looking like it only has one image. For each slot we try the common
    // extensions in order; a slot whose file doesn't exist is removed.
    const exts = ["jpg", "jpeg", "png", "webp", "gif"];
    const gallery = document.getElementById("gallery");
    const empty = document.getElementById("empty");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = lightbox.querySelector("img");
    let pending = 10, shown = 0;

    function settle() {
      // When every slot has either loaded or been ruled out, and none
      // showed up, reveal the "no images yet" hint.
      if (--pending <= 0 && shown === 0) empty.hidden = false;
    }

    for (let slot = 1; slot <= 10; slot++) {
      const fig = document.createElement("figure");
      fig.className = "loading";
      fig.style.order = slot;                       // keep visual order stable
      const img = document.createElement("img");
      img.alt = `Image ${slot}`;
      img.loading = "lazy";
      img.decoding = "async";
      let ext = 0;
      img.onload = () => {
        fig.classList.remove("loading");
        fig.classList.add("loaded");
        shown++;
        settle();
      };
      img.onerror = () => {
        if (++ext < exts.length) {                  // try the next extension
          img.src = `images/img${slot}.${exts[ext]}`;
        } else {                                     // this slot has no file
          fig.remove();
          settle();
        }
      };
      img.addEventListener("click", () => openLightbox(img.currentSrc || img.src));
      fig.appendChild(img);
      gallery.appendChild(fig);
      img.src = `images/img${slot}.${exts[0]}`;
    }

    function openLightbox(url) {
      lightboxImg.src = url;
      lightbox.classList.add("open");
    }
    lightbox.addEventListener("click", () => lightbox.classList.remove("open"));
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") lightbox.classList.remove("open");
    });
  </script>
</body>
</html>
